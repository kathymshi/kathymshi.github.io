<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Name</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: #1a1a1a;
      background: #fafafa;
      margin: 0;
      padding: 0;
    }

    .page-wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 4rem 1.5rem;
    }

    .card {
      display: flex;
      flex-wrap: wrap;
      gap: 2.5rem;
      align-items: flex-start;
      background: #ffffff;
      border: 1px solid #eaeaea;
      border-radius: 16px;
      padding: 2.5rem;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
    }

    .profile-photo {
      width: 128px;
      height: 128px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      border: 3px solid #f0f0f0;
    }

    .main-content {
      flex: 1;
      min-width: 240px;
    }

    .main-content h1 {
      margin: 0 0 0.25rem 0;
      font-size: 1.75rem;
      font-weight: 700;
    }

    .subtitle {
      color: #6b6b6b;
      margin: 0 0 1rem 0;
      font-size: 0.95rem;
    }

    .about-text {
      line-height: 1.6;
      color: #333;
      margin: 0;
    }

    .links-column {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      min-width: 170px;
    }

    .link-pill {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.6rem 1rem;
      background: #f5f5f5;
      border-radius: 10px;
      text-decoration: none;
      color: #1a1a1a;
      font-size: 0.9rem;
      font-weight: 500;
      transition: background 0.15s ease, transform 0.15s ease;
    }

    .link-pill:hover {
      background: #eaeaea;
      transform: translateX(-2px);
    }

    .link-pill .icon {
      font-size: 1.1rem;
    }

    @media (max-width: 500px) {
      .card {
        flex-direction: column;
        padding: 1.75rem;
      }
      .links-column {
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <div class="page-wrap">
    <div class="card">
      <img class="profile-photo" src="assets/profile.jpg" alt="Profile photo">

      <div class="main-content">
        <h1>Your Name</h1>
        <p class="subtitle">Your title or field — e.g. PhD Candidate, Computer Science</p>
        <p class="about-text">
          <!-- Fill this section out -->
          Write a couple of sentences about who you are, what you work on, and what you're interested in.
        </p>
      </div>

      <div class="links-column">
        <a class="link-pill" href="mailto:kathy.shi@yale.edu"><span class="icon">📧</span> Email</a>
        <a class="link-pill" href="assets/Shi_Kathy_CV.pdf"><span class="icon">📄</span> CV</a>
        <a class="link-pill" href="https://scholar.google.com/citations?user=Ua-7bwAAAAJ"><span class="icon">🎓</span> Google Scholar</a>
        <a class="link-pill" href="https://github.com/kathymshi"><span class="icon">💻</span> GitHub</a>
      </div>
    </div>
  </div>

</body>
</html>
